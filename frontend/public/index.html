<!DOCTYPE html>
<html>
<head>
<title>AWS Resume Analyzer</title>
<style>
body {
  font-family: Arial;
  margin: 40px;
}
button {
  padding: 10px;
}
</style>
</head>

<body>

<h1>AWS Resume Analyzer</h1>

<form id="uploadForm">
  <label>Upload Resume:</label><br>
  <input type="file" id="resume" required><br><br>

  <label>Upload Job Description:</label><br>
  <input type="file" id="jd" required><br><br>

  <button type="submit">Analyze Match</button>
</form>

<h2>Result</h2>
<pre id="result"></pre>

<script>

const API_URL = "http://35.154.73.87:8001/analyze-match";

document.getElementById("uploadForm").onsubmit = async (e) => {

  e.preventDefault();

  const formData = new FormData();

  formData.append("resume", document.getElementById("resume").files[0]);
  formData.append("jd", document.getElementById("jd").files[0]);

  const response = await fetch(API_URL, {
    method: "POST",
    body: formData
  });

  const data = await response.json();

  document.getElementById("result").textContent =
    JSON.stringify(data, null, 2);
};

</script>

</body>
</html>
